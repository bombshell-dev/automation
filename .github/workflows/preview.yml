name: preview
on:
  workflow_call:
    inputs:
      publish:
        description: "The directory to publish to pkg.pr.new"
        default: "./packages/**"
        required: false
        type: string
      template:
        description: "The directory of templates to publish to StackBlitz"
        default: "./examples/**"
        required: false
        type: string

permissions: {}

jobs:
  preview:
    if: github.repository_owner == 'bombshell-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Publish Preview
        env:
          TEMPLATE_GLOB: ${{ inputs.template }}
          PUBLISH_GLOB: ${{ inputs.publish }}
        run: pnpx pkg-pr-new publish "$PUBLISH_GLOB" --template "$TEMPLATE_GLOB"
