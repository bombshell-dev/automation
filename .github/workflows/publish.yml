name: publish

on:
  workflow_call:
    secrets:
      BOT_APP_ID:
        description: "The GitHub App ID for authenticating with the GitHub API"
        required: true
      BOT_PRIVATE_KEY:
        description: "The GitHub App Private Key for authenticating with the GitHub API"
        required: true

permissions: {}

jobs:
  build:
    if: github.repository_owner == 'bombshell-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Update NPM
        # WORKAROUND: The latest version of npm breaks itself whilst installing itself
        # see https://github.com/npm/cli/issues/9151
        run: npm install -g npm@~11.10.0

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/*/dist
          if-no-files-found: ignore
          retention-days: 1

  publish:
    needs: build
    if: github.repository_owner == 'bombshell-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Generate a token
        id: bot-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup git user
        run: |
          git config --global user.name "bombshell-bot[bot]"
          git config --global user.email "187071675+bombshell-bot[bot]@users.noreply.github.com"

      - name: Setup PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: "pnpm"

      - name: Update NPM
        # WORKAROUND: The latest version of npm breaks itself whilst installing itself
        # see https://github.com/npm/cli/issues/9151
        run: npm install -g npm@~11.10.0

      - name: Install dependencies (no scripts)
        run: pnpm install --ignore-scripts

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish
          commit: "[ci] release"
          title: "[ci] release"
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
