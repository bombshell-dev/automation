name: publish

on:
  workflow_call:
    secrets:
      BOT_APP_ID:
        description: "The GitHub App ID for authenticating with the GitHub API"
        required: true
      BOT_PRIVATE_KEY:
        description: "The GitHub App Private Key for authenticating with the GitHub API"
        required: true

permissions: {}

jobs:
  build:
    if: github.repository_owner == 'bombshell-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Update NPM
        # WORKAROUND: The latest version of npm breaks itself whilst installing itself
        # see https://github.com/npm/cli/issues/9151
        run: npm install -g npm@~11.10.0

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: |
            packages/*/dist
            dist
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    if: github.repository_owner == 'bombshell-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Generate a token
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup git user
        run: |
          git config --global user.name "bombshell-bot[bot]"
          git config --global user.email "187071675+bombshell-bot[bot]@users.noreply.github.com"

      - name: Setup PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: "pnpm"

      - name: Update NPM
        # WORKAROUND: The latest version of npm breaks itself whilst installing itself
        # see https://github.com/npm/cli/issues/9151
        run: npm install -g npm@~11.10.0

      - name: Install dependencies (no scripts)
        run: pnpm install --ignore-scripts

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish
          commit: "[ci] release"
          title: "[ci] release"
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
